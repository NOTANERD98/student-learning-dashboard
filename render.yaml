# Render.com Blueprint — optional alternative to Streamlit Cloud.
# In Render: New + → Blueprint → point at this repository.
services:
  - type: web
    name: student-learning-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run dashboard.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
